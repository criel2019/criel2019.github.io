<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Food Chain Defense</title>
  <meta name="description" content="Developer website for Food Chain Defense, an Android defense game by criel2019." />
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f1;
      --panel: #ffffff;
      --text: #172019;
      --muted: #5f6b62;
      --line: #d8dfd5;
      --accent: #1d7a45;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(23, 32, 25, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 6vw, 52px);
      line-height: 1.05;
    }

    h2 {
      margin: 28px 0 8px;
      font-size: 18px;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.65;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .links a {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      background: #f9fbf7;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Food Chain Defense</h1>
      <p>Food Chain Defense is an Android defense game developed by criel2019.</p>

      <h2>Developer</h2>
      <p>criel2019</p>

      <h2>Contact</h2>
      <p><a href="mailto:pjhk579700@naver.com">pjhk579700@naver.com</a></p>

      <div class="links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="app-ads.txt">app-ads.txt</a>
      </div>
    </section>
  </main>
</body>
</html>
